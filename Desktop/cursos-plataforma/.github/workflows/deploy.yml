name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          cd api-gateway && mvn clean package -DskipTests
          cd ../curso-service && mvn clean package -DskipTests
          cd ../inscripcion-service && mvn clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "api-gateway/target/api-gateway-1.0.0.jar,curso-service/target/curso-service-1.0.0.jar,inscripcion-service/target/inscripcion-service-1.0.0.jar"
          target: "/home/ubuntu/app/"
          strip_components: 2

      - name: Restart services on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo systemctl restart api-gateway
            sudo systemctl restart curso-service
            sudo systemctl restart inscripcion-service
