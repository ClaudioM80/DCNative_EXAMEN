server.port=8888

spring.application.name=api-gateway

# ===== CONFIGURACIÓN RABBITMQ =====
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ===== CONFIGURACIÓN OAUTH2 PARA AZURE =====
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID:85c9aac9-53b6-4169-98a4-748ee09873ad}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.scope[0]=openid
spring.security.oauth2.client.registration.azure.scope[1]=profile
spring.security.oauth2.client.registration.azure.scope[2]=email
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri=${AZURE_REDIRECT_URI:http://localhost:8888/login/oauth2/code/azure}
spring.security.oauth2.client.registration.azure.client-name=Azure

spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:f8caf0ac-8ae4-47f3-9e30-819cacaa97c9}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:f8caf0ac-8ae4-47f3-9e30-819cacaa97c9}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/v1.0/me
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:f8caf0ac-8ae4-47f3-9e30-819cacaa97c9}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-name-attribute=sub

# ===== AWS S3 (opcional, comentado para pruebas locales) =====
# aws.s3.bucket=${AWS_S3_BUCKET:mi-bucket}
# aws.access.key=${AWS_ACCESS_KEY:}
# aws.secret.key=${AWS_SECRET_KEY:}
# aws.region=${AWS_REGION:us-east-1}

logging.level.org.springframework.security=DEBUG
logging.level.cl.duoc.cloudnative=DEBUG

management.endpoints.web.exposure.include=health,info