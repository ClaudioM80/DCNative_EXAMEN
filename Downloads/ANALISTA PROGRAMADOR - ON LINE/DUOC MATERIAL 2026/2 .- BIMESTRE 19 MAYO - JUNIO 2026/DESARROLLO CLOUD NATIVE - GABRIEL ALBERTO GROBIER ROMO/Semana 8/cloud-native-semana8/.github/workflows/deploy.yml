name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push producer-service
        uses: docker/build-push-action@v4
        with:
          context: ./producer-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/producer-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/producer-service:${{ github.sha }}

      - name: Build and push consumer-service
        uses: docker/build-push-action@v4
        with:
          context: ./consumer-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloud-native-semana8
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/producer-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service:latest
            docker compose down
            docker compose up -d
