name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "❌ ERROR: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret is not set."
            echo "Set them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ DOCKERHUB_USERNAME is set to: ${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build producer-service JAR
        run: |
          cd producer-service
          mvn clean package -DskipTests

      - name: Build consumer-service JAR
        run: |
          cd consumer-service
          mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          platforms: linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push producer-service
        uses: docker/build-push-action@v4
        with:
          context: ./producer-service
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/producer-service:latest

      - name: Build and push consumer-service
        uses: docker/build-push-action@v4
        with:
          context: ./consumer-service
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Verificar e instalar docker-compose si no existe
            if ! command -v docker &> /dev/null; then
              echo "docker no encontrado, instalando..."
              sudo apt update
              sudo apt install -y docker.io
            fi

            cd ~/cloud-native-semana8
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/producer-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service:latest
            docker compose down
            docker compose up -d
