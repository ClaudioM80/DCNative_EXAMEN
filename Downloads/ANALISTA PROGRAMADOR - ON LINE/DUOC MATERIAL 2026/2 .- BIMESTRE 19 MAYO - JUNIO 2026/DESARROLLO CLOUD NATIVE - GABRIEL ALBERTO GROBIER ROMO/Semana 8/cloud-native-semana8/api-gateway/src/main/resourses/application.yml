spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: producer-service
          uri: http://44.220.157.241:8081
          predicates:
            - Path=/api/guias/**
          filters:
            - name: StripPrefix
              args:
                parts: 0

server:
  port: 8083

logging:
  level:
    org.springframework.cloud.gateway: DEBUG