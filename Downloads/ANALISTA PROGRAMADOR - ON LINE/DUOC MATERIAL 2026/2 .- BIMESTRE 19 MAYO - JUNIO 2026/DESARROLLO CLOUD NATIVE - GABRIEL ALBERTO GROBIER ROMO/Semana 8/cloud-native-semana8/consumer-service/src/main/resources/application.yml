spring:
  application:
    name: consumer-service
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

server:
  port: 8082

app:
  rabbitmq:
    exchange: pedidos.exchange
    queue: pedidos.queue
    routing-key: pedidos.creado
    dlx-exchange: pedidos.dlx.exchange
    dlq: pedidos.dlq

logging:
  level:
    cl.duoc.cloudnative: DEBUG
    org.springframework.amqp: DEBUG
